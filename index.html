<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Foxxy Companion</title>
    <style>
      :root {
        --bg-top: #fff9f1;
        --bg-bottom: #ffe7cf;
        --ground-top: #f8d7b6;
        --ground-bottom: #f1c39b;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: linear-gradient(180deg, var(--bg-top), var(--bg-bottom));
        font-family: Inter, system-ui, -apple-system, sans-serif;
      }

      .scene {
        position: fixed;
        inset: 0;
      }

      .ground {
        position: absolute;
        inset-inline: 0;
        bottom: 0;
        height: 96px;
        border-top: 2px solid rgba(145, 82, 28, 0.25);
        background: linear-gradient(180deg, var(--ground-top), var(--ground-bottom));
      }

      #fox {
        position: absolute;
        left: 0;
        bottom: 96px;
        background-repeat: no-repeat;
        image-rendering: pixelated;
        transform-origin: center bottom;
        will-change: transform, background-position;
        user-select: none;
        -webkit-user-drag: none;
        cursor: pointer;
        outline: none;
        z-index: 2;
      }

      #fox:focus-visible {
        filter: drop-shadow(0 0 0 3px rgba(90, 140, 255, 0.25));
      }

      .label {
        position: fixed;
        left: 50%;
        bottom: 10px;
        transform: translateX(-50%);
        color: #7f4a27;
        opacity: 0.9;
        font-size: 13px;
        letter-spacing: 0.01em;
        text-align: center;
        padding: 0 12px;
      }

      .error {
        position: fixed;
        top: 16px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(140, 34, 34, 0.9);
        color: white;
        padding: 10px 14px;
        border-radius: 12px;
        font-size: 14px;
        display: none;
        z-index: 10;
      }

      .error.show {
        display: block;
      }

      #zzz-layer {
        position: absolute;
        inset: 0;
        pointer-events: none;
        z-index: 3;
      }

      .zzz {
        position: absolute;
        color: #6fa8ff;
        font-weight: 700;
        opacity: 0;
        text-shadow: 0 1px 0 rgba(255, 255, 255, 0.9);
        animation: zzz-float 2.2s ease-out forwards;
        will-change: transform, opacity;
      }

      .zzz.z1 {
        font-size: 18px;
      }

      .zzz.z2 {
        font-size: 24px;
      }

      .zzz.z3 {
        font-size: 30px;
      }

      @keyframes zzz-float {
        0% {
          opacity: 0;
          transform: translate3d(0, 0, 0) scale(0.85);
        }
        15% {
          opacity: 0.95;
        }
        100% {
          opacity: 0;
          transform: translate3d(28px, -70px, 0) scale(1.12);
        }
      }
    </style>
  </head>
  <body>
    <div class="scene" id="scene">
      <div
        id="fox"
        role="button"
        tabindex="0"
        aria-label="Animated pixel fox"
      ></div>
      <div id="zzz-layer" aria-hidden="true"></div>
      <div class="ground"></div>
    </div>

    <div class="label">Move your mouse and Foxxy follows • Click Foxxy for a cute reaction 🦊</div>
    <div id="error" class="error">Could not load Foxxy sprite sheet.</div>

    <script>
      const foxEl = document.getElementById("fox");
      const errorEl = document.getElementById("error");
      const sceneEl = document.getElementById("scene");
      const zzzLayerEl = document.getElementById("zzz-layer");

      const SPRITE_SRC = "./Foxxy.png";
      const spriteImage = new Image();
      spriteImage.src = SPRITE_SRC;

      const GRID_COLS = 4;
      const GRID_ROWS = 4;
      const SCALE = 6;
      const GROUND_HEIGHT = 96;

      const ANIMATIONS = {
        idle: { frames: [0, 1, 2, 3], frameDuration: 150, loop: true, moves: false },
        walk: { frames: [4, 5, 6, 7], frameDuration: 95, loop: true, moves: true },
        jump: { frames: [8, 9, 10, 11], frameDuration: 95, loop: false, moves: true },
        sleep: { frames: [12, 13, 14, 15], frameDuration: 220, loop: true, moves: false },
        cute: { frames: [12, 13, 14, 15], frameDuration: 135, loop: true, moves: false },
      };

      const fox = {
        x: 0,
        y: 0,
        vx: 0,
        vy: 0,
        maxSpeed: 220,
        acceleration: 1300,
        friction: 1700,
        direction: 1,
        gravity: -1750,
        jumpVelocity: 780,
        grounded: true,

        state: "idle",
        frameCursor: 0,
        frameTimer: 0,

        squash: 0,

        actionTimerMs: 0,
        lastInteractionMs: performance.now(),
        sleepingTriggered: false,
        sleepBubbleTimerMs: 0,
      };

      const viewport = {
        maxX: 0,
      };

      const metrics = {
        frameWidth: 0,
        frameHeight: 0,
        renderFrameWidth: 0,
        renderFrameHeight: 0,
      };

      const mouse = {
        x: window.innerWidth * 0.5,
        active: false,
      };

      let lastTimeMs = performance.now();

      function clamp(v, min, max) {
        return Math.max(min, Math.min(max, v));
      }

      function approximately(a, b, epsilon = 4) {
        return Math.abs(a - b) <= epsilon;
      }

      function setState(nextState, { resetFrame = true, force = false } = {}) {
        if (!force && fox.state === nextState) return;
        fox.state = nextState;
        fox.frameTimer = 0;
        if (resetFrame) fox.frameCursor = 0;
      }

      function recalcBounds() {
        viewport.maxX = Math.max(0, window.innerWidth - metrics.renderFrameWidth);
        fox.x = clamp(fox.x, 0, viewport.maxX);
        mouse.x = clamp(mouse.x, 0, window.innerWidth);
      }

      function beginJump() {
        if (!fox.grounded) return;
        fox.grounded = false;
        fox.vy = fox.jumpVelocity;
        fox.sleepingTriggered = false;
        fox.sleepBubbleTimerMs = 0;
        setState("jump");
      }

      function triggerCuteReaction(nowMs = performance.now()) {
        fox.lastInteractionMs = nowMs;
        fox.actionTimerMs = 0;
        fox.sleepingTriggered = false;
        fox.sleepBubbleTimerMs = 0;

        if (fox.state === "jump") return;
        setState("cute", { force: true });
      }

      function returnToMouseFollow() {
        fox.actionTimerMs = 0;
        fox.sleepBubbleTimerMs = 0;
        if (!fox.grounded) {
          setState("jump");
          return;
        }

        if (!mouse.active) {
          setState("idle");
          return;
        }

        const targetX = getTargetFoxX();
        const distance = targetX - fox.x;

        if (Math.abs(distance) > 10) {
          setState("walk");
        } else {
          setState("idle");
        }
      }

      function getTargetFoxX() {
        return clamp(mouse.x - metrics.renderFrameWidth * 0.5, 0, viewport.maxX);
      }

      function spawnSleepBubble() {
        const foxCenterX = fox.x + metrics.renderFrameWidth * 0.68;
        const foxTopY = window.innerHeight - GROUND_HEIGHT - fox.y - metrics.renderFrameHeight + 18;

        const variants = [
          { text: "z", className: "z1", dx: 0, dy: 0 },
          { text: "Z", className: "z2", dx: 14, dy: -10 },
          { text: "Z", className: "z3", dx: 28, dy: -22 },
        ];

        variants.forEach((variant, index) => {
          const el = document.createElement("div");
          el.className = `zzz ${variant.className}`;
          el.textContent = variant.text;
          el.style.left = `${foxCenterX + variant.dx}px`;
          el.style.top = `${foxTopY + variant.dy}px`;
          el.style.animationDelay = `${index * 0.18}s`;
          zzzLayerEl.appendChild(el);
          el.addEventListener("animationend", () => el.remove(), { once: true });
        });
      }

      function updateBehavior(dtMs, nowMs) {
        fox.actionTimerMs += dtMs;

        const idleDurationMs = nowMs - fox.lastInteractionMs;

        if (
          idleDurationMs > 7000 &&
          fox.grounded &&
          (fox.state === "idle" || fox.state === "walk") &&
          !fox.sleepingTriggered &&
          !mouse.active
        ) {
          fox.vx = 0;
          fox.sleepBubbleTimerMs = 0;
          fox.sleepingTriggered = true;
          setState("sleep");
          fox.actionTimerMs = 0;
          return;
        }

        if (fox.state === "cute" && fox.actionTimerMs >= 1400) {
          returnToMouseFollow();
          return;
        }

        if (fox.state === "sleep") {
          fox.sleepBubbleTimerMs += dtMs;
          if (fox.sleepBubbleTimerMs >= 1700) {
            fox.sleepBubbleTimerMs = 0;
            spawnSleepBubble();
          }

          if (mouse.active || idleDurationMs < 6500) {
            fox.sleepingTriggered = false;
            returnToMouseFollow();
          }
        }
      }

      function updateMovement(dtSec) {
        if (fox.state === "cute" || fox.state === "sleep") {
          fox.vx = 0;
          return;
        }

        if (fox.state === "jump") {
          fox.x += fox.vx * dtSec;
          fox.x = clamp(fox.x, 0, viewport.maxX);

          if (fox.x <= 0) fox.direction = 1;
          if (fox.x >= viewport.maxX) fox.direction = -1;
          return;
        }

        const targetX = getTargetFoxX();
        const distance = targetX - fox.x;
        const moveThreshold = 6;

        if (Math.abs(distance) > moveThreshold) {
          fox.direction = distance > 0 ? 1 : -1;
        }

        if (Math.abs(distance) <= moveThreshold) {
          if (fox.vx > 0) {
            fox.vx = Math.max(0, fox.vx - fox.friction * dtSec);
          } else if (fox.vx < 0) {
            fox.vx = Math.min(0, fox.vx + fox.friction * dtSec);
          }
        } else {
          fox.vx += fox.direction * fox.acceleration * dtSec;
          fox.vx = clamp(fox.vx, -fox.maxSpeed, fox.maxSpeed);
        }

        fox.x += fox.vx * dtSec;
        fox.x = clamp(fox.x, 0, viewport.maxX);

        if (fox.x === 0 && fox.vx < 0) fox.vx = 0;
        if (fox.x === viewport.maxX && fox.vx > 0) fox.vx = 0;

        if (approximately(fox.x, targetX, 8) && Math.abs(fox.vx) < 24) {
          fox.vx = 0;
          setState("idle");
        } else if (Math.abs(fox.vx) > 8) {
          setState("walk");
        } else {
          setState("idle");
        }
      }

      function updatePhysics(dtSec) {
        if (!fox.grounded) {
          fox.vy += fox.gravity * dtSec;
          fox.y += fox.vy * dtSec;

          if (fox.y <= 0) {
            fox.y = 0;
            fox.vy = 0;
            fox.grounded = true;
            fox.squash = 0.16;
            returnToMouseFollow();
          }
        }

        fox.squash = Math.max(0, fox.squash - dtSec * 0.7);
      }

      function updateAnimation(dtMs) {
        const animation = ANIMATIONS[fox.state];
        fox.frameTimer += dtMs;

        while (fox.frameTimer >= animation.frameDuration) {
          fox.frameTimer -= animation.frameDuration;

          if (fox.frameCursor < animation.frames.length - 1) {
            fox.frameCursor += 1;
          } else if (animation.loop) {
            fox.frameCursor = 0;
          }
        }
      }

      function update(dtMs, nowMs) {
        const dtSec = dtMs / 1000;
        updateBehavior(dtMs, nowMs);
        updateMovement(dtSec);
        updatePhysics(dtSec);
        updateAnimation(dtMs);
      }

      function render() {
        const animation = ANIMATIONS[fox.state];
        const frame = animation.frames[fox.frameCursor];
        const col = frame % GRID_COLS;
        const row = Math.floor(frame / GRID_COLS);

        foxEl.style.backgroundPosition =
          `-${col * metrics.renderFrameWidth}px -${row * metrics.renderFrameHeight}px`;

        const squashY = 1 - fox.squash;
        const stretchX = 1 + fox.squash * 0.65;

        foxEl.style.transform =
          `translate3d(${fox.x}px, ${-fox.y}px, 0) ` +
          `scaleX(${fox.direction * stretchX}) ` +
          `scaleY(${squashY})`;
      }

      function loop(nowMs) {
        const dtMs = Math.min(40, nowMs - lastTimeMs);
        lastTimeMs = nowMs;

        update(dtMs, nowMs);
        render();
        requestAnimationFrame(loop);
      }

      foxEl.addEventListener("click", () => {
        triggerCuteReaction();
      });

      foxEl.addEventListener("pointerdown", () => {
        triggerCuteReaction();
      });

      foxEl.addEventListener("keydown", (event) => {
        if (event.key === "Enter" || event.key === " ") {
          event.preventDefault();
          triggerCuteReaction();
        }
        if (event.key === "ArrowUp") {
          event.preventDefault();
          fox.lastInteractionMs = performance.now();
          mouse.active = true;
          beginJump();
        }
      });

      window.addEventListener("pointermove", (event) => {
        mouse.x = event.clientX;
        mouse.active = true;
        fox.lastInteractionMs = performance.now();
        fox.sleepingTriggered = false;

        if (fox.state === "sleep") {
          returnToMouseFollow();
        }
      });

      window.addEventListener("pointerleave", () => {
        mouse.active = false;
      });

      window.addEventListener("resize", recalcBounds);

      spriteImage.addEventListener("load", () => {
        metrics.frameWidth = Math.floor(spriteImage.width / GRID_COLS);
        metrics.frameHeight = Math.floor(spriteImage.height / GRID_ROWS);
        metrics.renderFrameWidth = metrics.frameWidth * SCALE;
        metrics.renderFrameHeight = metrics.frameHeight * SCALE;

        foxEl.style.width = `${metrics.renderFrameWidth}px`;
        foxEl.style.height = `${metrics.renderFrameHeight}px`;
        foxEl.style.backgroundImage = `url("${SPRITE_SRC}")`;
        foxEl.style.backgroundSize =
          `${spriteImage.width * SCALE}px ${spriteImage.height * SCALE}px`;

        fox.x = clamp((window.innerWidth - metrics.renderFrameWidth) * 0.35, 0, window.innerWidth);
        recalcBounds();

        render();
        requestAnimationFrame(loop);
      });

      spriteImage.addEventListener("error", () => {
        errorEl.classList.add("show");
        console.error("Failed to load sprite sheet:", spriteImage.src);
      });
    </script>
  </body>
</html>
