<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Playful Pixel Fox</title>
    <style>
      :root {
        --sky-top: #fff8f1;
        --sky-bottom: #ffe8d5;
        --ground: #f8d7b4;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: linear-gradient(180deg, var(--sky-top), var(--sky-bottom));
        font-family: ui-rounded, "Segoe UI", system-ui, sans-serif;
      }

      #scene {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
        image-rendering: pixelated;
      }

      .hint {
        position: fixed;
        left: 50%;
        transform: translateX(-50%);
        bottom: 12px;
        font-size: 0.8rem;
        letter-spacing: 0.02em;
        color: #8f6242;
        user-select: none;
        opacity: 0.7;
      }
    </style>
  </head>
  <body>
    <canvas id="scene"></canvas>
    <div class="hint">Tiny fox patrol on duty 🦊</div>

    <script>
      const canvas = document.getElementById("scene");
      const ctx = canvas.getContext("2d", { alpha: true });

      function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }
      window.addEventListener("resize", resize);
      resize();

      const C = {
        T: null,
        O: "#f28c28",
        O2: "#de7413",
        C: "#ffd8b1",
        W: "#fff9f2",
        E: "#2b1b12",
        P: "#ffb7a1",
      };

      const frameIdle = [
        "................",
        "......W.........",
        ".....W.O........",
        "...W.OOOO..W....",
        "..W.OOOOOOOW....",
        "..W.OOOOOOOOW...",
        ".W.OOOCCOOOOW...",
        ".W.OOCCCCOOOOW..",
        ".W.OCCCCCCOOOW..",
        "..W.OCCCCOOOOW..",
        "...W.OOOOOWWW...",
        "....W.OOOOOW....",
        "....W.OOOOOW....",
        "...W.OOWWOOOW...",
        "...W.OO..OOOW...",
        "....WW....WW....",
      ];

      const frameWalkA = [
        "................",
        "......W.........",
        ".....W.O........",
        "...W.OOOO..W....",
        "..W.OOOOOOOW....",
        "..W.OOOOOOOOW...",
        ".W.OOOCCOOOOW...",
        ".W.OOCCCCOOOOW..",
        ".W.OCCCCCCOOOW..",
        "..W.OCCCCOOOOW..",
        "...W.OOOOOWWW...",
        "....W.OOOOOW....",
        "....W.OOOOOW....",
        "...W.OOWWOOOW...",
        "..W.OO....OOOW..",
        "...WW......WW...",
      ];

      const frameWalkB = [
        "................",
        "......W.........",
        ".....W.O........",
        "...W.OOOO..W....",
        "..W.OOOOOOOW....",
        "..W.OOOOOOOOW...",
        ".W.OOOCCOOOOW...",
        ".W.OOCCCCOOOOW..",
        ".W.OCCCCCCOOOW..",
        "..W.OCCCCOOOOW..",
        "...W.OOOOOWWW...",
        "....W.OOOOOW....",
        "....W.OOOOOW....",
        "...W.OOWWOOOW...",
        "...W.OOO..OOOW..",
        "....WW....WW....",
      ];

      const frameJump = [
        "................",
        "......W.........",
        ".....W.O........",
        "...W.OOOO..W....",
        "..W.OOOOOOOW....",
        "..W.OOOOOOOOW...",
        ".W.OOOCCOOOOW...",
        ".W.OOCCCCOOOOW..",
        ".W.OCCCCCCOOOW..",
        "..W.OCCCCOOOOW..",
        "...W.OOOOOWWW...",
        "....W.OOOOOW....",
        "....W.OOOOOW....",
        "....W.OOWOOOW...",
        ".....W.OOOOW....",
        "......WWWW......",
      ];

      function buildSprite(map, pixelSize = 1) {
        const h = map.length;
        const w = map[0].length;
        const cv = document.createElement("canvas");
        cv.width = w * pixelSize;
        cv.height = h * pixelSize;
        const c = cv.getContext("2d");

        for (let y = 0; y < h; y++) {
          for (let x = 0; x < w; x++) {
            const char = map[y][x];
            if (!char || char === "." || char === "T") continue;
            c.fillStyle = C[char] ?? C.T;
            c.fillRect(x * pixelSize, y * pixelSize, pixelSize, pixelSize);
          }
        }

        // Tiny eye + nose details on top for cuteness.
        c.fillStyle = C.E;
        c.fillRect(9, 7, 1, 1);
        c.fillRect(12, 8, 1, 1);
        c.fillStyle = C.P;
        c.fillRect(8, 3, 1, 1);

        return cv;
      }

      const frames = {
        idle: buildSprite(frameIdle),
        walkA: buildSprite(frameWalkA),
        walkB: buildSprite(frameWalkB),
        jump: buildSprite(frameJump),
      };

      const fox = {
        x: 12,
        y: 0,
        vx: 115,
        direction: 1,
        scale: 6,
        width: 16,
        height: 16,
        currentFrame: "idle",
        frameTimer: 0,
        walkToggle: false,
        isJumping: false,
        jumpElapsed: 0,
        jumpDuration: 0.62,
        jumpHeight: 56,
        landBounce: 0,
        nextJumpAt: 2.8 + Math.random() * 2,
      };

      let last = performance.now();

      function easeOutBack(t) {
        const c1 = 1.70158;
        const c3 = c1 + 1;
        return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
      }

      function update(dt) {
        const spriteW = fox.width * fox.scale;
        const baseline = canvas.height - fox.height * fox.scale - 12;

        fox.x += fox.vx * fox.direction * dt;

        if (fox.x <= 0) {
          fox.x = 0;
          fox.direction = 1;
        } else if (fox.x >= canvas.width - spriteW) {
          fox.x = canvas.width - spriteW;
          fox.direction = -1;
        }

        fox.nextJumpAt -= dt;
        if (!fox.isJumping && fox.nextJumpAt <= 0) {
          fox.isJumping = true;
          fox.jumpElapsed = 0;
          fox.jumpDuration = 0.52 + Math.random() * 0.18;
          fox.jumpHeight = 48 + Math.random() * 18;
          fox.nextJumpAt = 2.5 + Math.random() * 3.2;
        }

        let jumpOffset = 0;
        if (fox.isJumping) {
          fox.jumpElapsed += dt;
          const t = Math.min(fox.jumpElapsed / fox.jumpDuration, 1);
          const arc = Math.sin(Math.PI * t);
          jumpOffset = arc * fox.jumpHeight;

          if (t >= 1) {
            fox.isJumping = false;
            fox.landBounce = 1;
          }
        }

        if (!fox.isJumping && fox.landBounce > 0.001) {
          const bounce = Math.sin(fox.landBounce * Math.PI * 2.6) * 6 * fox.landBounce;
          jumpOffset += Math.max(0, bounce);
          fox.landBounce *= Math.pow(0.05, dt);
        }

        fox.y = baseline - jumpOffset;

        fox.frameTimer += dt;
        const isMoving = Math.abs(fox.vx) > 0;

        if (fox.isJumping) {
          fox.currentFrame = "jump";
        } else if (isMoving) {
          if (fox.frameTimer > 0.18) {
            fox.walkToggle = !fox.walkToggle;
            fox.frameTimer = 0;
          }
          fox.currentFrame = fox.walkToggle ? "walkA" : "walkB";
        } else {
          fox.currentFrame = "idle";
        }

        // tiny squash/stretch while jumping for extra playfulness
        const jumpT = fox.isJumping ? fox.jumpElapsed / fox.jumpDuration : 0;
        fox.y -= fox.isJumping ? easeOutBack(Math.min(jumpT, 1)) * 1.5 : 0;
      }

      function drawGround() {
        ctx.fillStyle = "rgba(248, 215, 180, 0.7)";
        ctx.fillRect(0, canvas.height - 72, canvas.width, 72);

        ctx.strokeStyle = "rgba(197, 137, 84, 0.35)";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(0, canvas.height - 72);
        ctx.lineTo(canvas.width, canvas.height - 72);
        ctx.stroke();
      }

      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        drawGround();

        const sprite = frames[fox.currentFrame];
        const w = fox.width * fox.scale;
        const h = fox.height * fox.scale;

        ctx.save();
        if (fox.direction === -1) {
          ctx.translate(fox.x + w, fox.y);
          ctx.scale(-1, 1);
          ctx.drawImage(sprite, 0, 0, fox.width, fox.height, 0, 0, w, h);
        } else {
          ctx.drawImage(sprite, 0, 0, fox.width, fox.height, fox.x, fox.y, w, h);
        }
        ctx.restore();
      }

      function tick(now) {
        const dt = Math.min((now - last) / 1000, 0.033);
        last = now;

        update(dt);
        draw();

        requestAnimationFrame(tick);
      }

      requestAnimationFrame(tick);
    </script>
  </body>
</html>
