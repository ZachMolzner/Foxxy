<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Production Fox Sprite Sheet Demo</title>
    <style>
      :root {
        --bg-top: #fff9f1;
        --bg-bottom: #ffe7cf;
        --ground-top: #f8d7b6;
        --ground-bottom: #f1c39b;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: linear-gradient(180deg, var(--bg-top), var(--bg-bottom));
        font-family: Inter, system-ui, -apple-system, sans-serif;
      }

      .scene {
        position: fixed;
        inset: 0;
      }

      .ground {
        position: absolute;
        inset-inline: 0;
        bottom: 0;
        height: 96px;
        border-top: 2px solid rgba(145, 82, 28, 0.25);
        background: linear-gradient(180deg, var(--ground-top), var(--ground-bottom));
      }

      #fox {
        position: absolute;
        left: 0;
        bottom: 96px;
        background-repeat: no-repeat;
        image-rendering: pixelated;
        transform-origin: center bottom;
        will-change: transform, background-position;
        user-select: none;
        -webkit-user-drag: none;
        cursor: pointer;
        outline: none;
      }

      #fox:focus-visible {
        filter: drop-shadow(0 0 0 3px rgba(90, 140, 255, 0.25));
      }

      .label {
        position: fixed;
        left: 50%;
        bottom: 10px;
        transform: translateX(-50%);
        color: #7f4a27;
        opacity: 0.85;
        font-size: 13px;
        letter-spacing: 0.01em;
        text-align: center;
        padding: 0 12px;
      }

      .error {
        position: fixed;
        top: 16px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(140, 34, 34, 0.9);
        color: white;
        padding: 10px 14px;
        border-radius: 12px;
        font-size: 14px;
        display: none;
      }

      .error.show {
        display: block;
      }
    </style>
  </head>
  <body>
    <div class="scene">
      <div
        id="fox"
        role="button"
        tabindex="0"
        aria-label="Animated pixel fox"
      ></div>
      <div class="ground"></div>
    </div>

    <div class="label">Click or tap the fox for a cute reaction 🦊</div>
    <div id="error" class="error">Could not load fox sprite sheet.</div>

    <script>
      const foxEl = document.getElementById("fox");
      const errorEl = document.getElementById("error");

      const SPRITE_SRC = "./Foxxy.png";
      const spriteImage = new Image();
      spriteImage.src = SPRITE_SRC;

      const GRID_COLS = 4;
      const GRID_ROWS = 4;
      const SCALE = 6;

      const ANIMATIONS = {
        idle: { frames: [0, 1, 2, 3], frameDuration: 130, loop: true, moves: false },
        walk: { frames: [4, 5, 6, 7], frameDuration: 100, loop: true, moves: true },
        jump: { frames: [8, 9, 10, 11], frameDuration: 100, loop: false, moves: true },
        cute: { frames: [12, 13, 14, 15], frameDuration: 140, loop: true, moves: false },
      };

      const fox = {
        x: 0,
        y: 0,
        vx: 110,
        vy: 0,
        direction: 1,
        gravity: -1750,
        jumpVelocity: 780,
        grounded: true,

        state: "walk",
        frameCursor: 0,
        frameTimer: 0,

        squash: 0,

        actionTimerMs: 0,
        nextRandomActionMs: randomActionDelay(),
        lastInteractionMs: performance.now(),
        sleepingTriggered: false,
      };

      const viewport = {
        maxX: 0,
      };

      const metrics = {
        frameWidth: 0,
        frameHeight: 0,
        renderFrameWidth: 0,
        renderFrameHeight: 0,
      };

      let lastTimeMs = performance.now();

      function randomActionDelay() {
        return 2500 + Math.random() * 3000;
      }

      function clamp(v, min, max) {
        return Math.max(min, Math.min(max, v));
      }

      function setState(nextState, { resetFrame = true } = {}) {
        if (fox.state === nextState) return;
        fox.state = nextState;
        fox.frameTimer = 0;
        if (resetFrame) fox.frameCursor = 0;
      }

      function recalcBounds() {
        viewport.maxX = Math.max(0, window.innerWidth - metrics.renderFrameWidth);
        fox.x = clamp(fox.x, 0, viewport.maxX);
      }

      function beginJump() {
        if (!fox.grounded) return;
        fox.grounded = false;
        fox.vy = fox.jumpVelocity;
        fox.sleepingTriggered = false;
        setState("jump");
      }

      function chooseRandomBehavior() {
        const roll = Math.random();
        if (roll < 0.45) return "idle";
        if (roll < 0.75) return "jump";
        return "cute";
      }

      function triggerCuteReaction(nowMs = performance.now()) {
        fox.lastInteractionMs = nowMs;
        fox.actionTimerMs = 0;
        fox.nextRandomActionMs = randomActionDelay();
        fox.sleepingTriggered = false;

        if (fox.state === "jump") return;
        setState("cute");
      }

      function returnToWalk() {
        setState("walk");
        fox.actionTimerMs = 0;
        fox.nextRandomActionMs = randomActionDelay();
      }

      function updateBehavior(dtMs, nowMs) {
        fox.actionTimerMs += dtMs;

        const idleDurationMs = nowMs - fox.lastInteractionMs;

        if (
          idleDurationMs > 6500 &&
          fox.grounded &&
          fox.state === "walk" &&
          !fox.sleepingTriggered
        ) {
          setState("cute");
          fox.actionTimerMs = 0;
          fox.sleepingTriggered = true;
          return;
        }

        if (fox.state === "walk") {
          fox.nextRandomActionMs -= dtMs;

          if (fox.nextRandomActionMs <= 0) {
            const next = chooseRandomBehavior();
            fox.actionTimerMs = 0;
            fox.nextRandomActionMs = randomActionDelay();

            if (next === "jump") {
              beginJump();
            } else {
              setState(next);
            }
          }
          return;
        }

        const timeoutByState = {
          idle: 1200,
          cute: 1600,
        };

        if (
          (fox.state === "idle" || fox.state === "cute") &&
          fox.actionTimerMs >= timeoutByState[fox.state]
        ) {
          returnToWalk();
        }
      }

      function updateMovement(dtSec) {
        const animation = ANIMATIONS[fox.state];
        if (!animation.moves) return;

        fox.vx = Math.abs(fox.vx) * fox.direction;
        fox.x += fox.vx * dtSec;

        if (fox.x <= 0) {
          fox.x = 0;
          fox.direction = 1;
        } else if (fox.x >= viewport.maxX) {
          fox.x = viewport.maxX;
          fox.direction = -1;
        }
      }

      function updatePhysics(dtSec) {
        if (!fox.grounded) {
          fox.vy += fox.gravity * dtSec;
          fox.y += fox.vy * dtSec;

          if (fox.y <= 0) {
            fox.y = 0;
            fox.vy = 0;
            fox.grounded = true;
            fox.squash = 0.16;

            if (fox.state === "jump") {
              returnToWalk();
            }
          }
        }

        fox.squash = Math.max(0, fox.squash - dtSec * 0.7);
      }

      function updateAnimation(dtMs) {
        const animation = ANIMATIONS[fox.state];
        fox.frameTimer += dtMs;

        while (fox.frameTimer >= animation.frameDuration) {
          fox.frameTimer -= animation.frameDuration;

          if (fox.frameCursor < animation.frames.length - 1) {
            fox.frameCursor += 1;
          } else if (animation.loop) {
            fox.frameCursor = 0;
          }
        }
      }

      function update(dtMs, nowMs) {
        const dtSec = dtMs / 1000;
        updateBehavior(dtMs, nowMs);
        updateMovement(dtSec);
        updatePhysics(dtSec);
        updateAnimation(dtMs);
      }

      function render() {
        const animation = ANIMATIONS[fox.state];
        const frame = animation.frames[fox.frameCursor];
        const col = frame % GRID_COLS;
        const row = Math.floor(frame / GRID_COLS);

        foxEl.style.backgroundPosition =
          `-${col * metrics.renderFrameWidth}px -${row * metrics.renderFrameHeight}px`;

        const squashY = 1 - fox.squash;
        const stretchX = 1 + fox.squash * 0.65;

        foxEl.style.transform =
          `translate3d(${fox.x}px, ${-fox.y}px, 0) ` +
          `scaleX(${fox.direction * stretchX}) ` +
          `scaleY(${squashY})`;
      }

      function loop(nowMs) {
        const dtMs = Math.min(40, nowMs - lastTimeMs);
        lastTimeMs = nowMs;

        update(dtMs, nowMs);
        render();
        requestAnimationFrame(loop);
      }

      foxEl.addEventListener("click", () => {
        triggerCuteReaction();
      });

      foxEl.addEventListener("pointerdown", () => {
        triggerCuteReaction();
      });

      foxEl.addEventListener("keydown", (event) => {
        if (event.key === "Enter" || event.key === " ") {
          event.preventDefault();
          triggerCuteReaction();
        }
      });

      window.addEventListener("resize", recalcBounds);

      spriteImage.addEventListener("load", () => {
        metrics.frameWidth = Math.floor(spriteImage.width / GRID_COLS);
        metrics.frameHeight = Math.floor(spriteImage.height / GRID_ROWS);
        metrics.renderFrameWidth = metrics.frameWidth * SCALE;
        metrics.renderFrameHeight = metrics.frameHeight * SCALE;

        foxEl.style.width = `${metrics.renderFrameWidth}px`;
        foxEl.style.height = `${metrics.renderFrameHeight}px`;
        foxEl.style.backgroundImage = `url("${SPRITE_SRC}")`;
        foxEl.style.backgroundSize =
          `${spriteImage.width * SCALE}px ${spriteImage.height * SCALE}px`;

        fox.x = (window.innerWidth - metrics.renderFrameWidth) * 0.35;
        recalcBounds();

        render();
        requestAnimationFrame(loop);
      });

      spriteImage.addEventListener("error", () => {
        errorEl.classList.add("show");
        console.error("Failed to load sprite sheet:", spriteImage.src);
      });
    </script>
  </body>
</html>
